services:
  db:
    image: postgres:15-alpine
    container_name: inboxradar-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: inboxradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inboxradar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inboxradar-backend
    ports:
      - "8000:8000"
    command: sh -c "prisma db push --schema=schema.prisma --accept-data-loss && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      # Mount mock dataset so changes to it on host reflect inside the container
      - ./mock_emails.json:/app/mock_emails.json
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inboxradar-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
